{% extends "base.html" %}

{% block title %}MAAS Manutenção{% endblock %}

{% block conteudo %}
<div class="control-bar">
    <div style="display:flex; align-items:center; gap:8px;">
        <div class="select-wrapper">
            <label><i class="fas fa-calendar-alt"></i> Período:</label>
            <select id="select-mes" onchange="carregarRelatorio()">
                <option value="1" {% if mes_atual == 1 %}selected{% endif %}>Janeiro</option>
                <option value="2" {% if mes_atual == 2 %}selected{% endif %}>Fevereiro</option>
                <option value="3" {% if mes_atual == 3 %}selected{% endif %}>Março</option>
                <option value="4" {% if mes_atual == 4 %}selected{% endif %}>Abril</option>
                <option value="5" {% if mes_atual == 5 %}selected{% endif %}>Maio</option>
                <option value="6" {% if mes_atual == 6 %}selected{% endif %}>Junho</option>
                <option value="7" {% if mes_atual == 7 %}selected{% endif %}>Julho</option>
                <option value="8" {% if mes_atual == 8 %}selected{% endif %}>Agosto</option>
                <option value="9" {% if mes_atual == 9 %}selected{% endif %}>Setembro</option>
                <option value="10" {% if mes_atual == 10 %}selected{% endif %}>Outubro</option>
                <option value="11" {% if mes_atual == 11 %}selected{% endif %}>Novembro</option>
                <option value="12" {% if mes_atual == 12 %}selected{% endif %}>Dezembro</option>
            </select>
        </div>
        <div class="select-wrapper">
            <select id="select-ano" onchange="carregarRelatorio()">
                <option value="2024" {% if ano_atual == 2024 %}selected{% endif %}>2024</option>
                <option value="2025" {% if ano_atual == 2025 %}selected{% endif %}>2025</option>
                <option value="2026" {% if ano_atual == 2026 %}selected{% endif %}>2026</option>
            </select>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-primary" onclick="carregarRelatorio()">
            <i class="fas fa-sync"></i> Atualizar
        </button>
        <button class="btn-secondary" onclick="window.print()">
            <i class="fas fa-file-pdf"></i> Gerar PDF
        </button>
    </div>
</div>

<div id="relatorio-area">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
function carregarRelatorio() {
    const mes = document.getElementById('select-mes').value;
    const ano = document.getElementById('select-ano').value;
    const area = document.getElementById('relatorio-area');

    area.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>';

    fetch(`/api/relatorio?mes=${mes}&ano=${ano}`)
        .then(r => r.json())
        .then(data => {
            if (!data.success || !data.ordens || data.ordens.length === 0) {
                area.innerHTML = '<div class="empty-message">Nenhuma ordem encontrada para o período.</div>';
                return;
            }

            // ── CAPA ──
            const resumoExec = data.resumo_executivo;
            const totalFixo = resumoExec
                .filter(i => typeof i['Valor (R$)'] === 'number')
                .reduce((acc, i) => acc + i['Valor (R$)'], 0);

            let htmlCapa = '';
            for (const item of resumoExec) {
                const valor = item['Valor (R$)'];
                const valorFormatado = valor === null
                    ? '<span style="color:#f0a500; font-style:italic;">⏳ Pendente API</span>'
                    : `R$ ${formatarMoeda(valor)}`;
                htmlCapa += `
                    <tr>
                        <td><strong>${item['Item']}</strong></td>
                        <td style="color:#555;">${item['Descrição']}</td>
                        <td class="text-right">${valorFormatado}</td>
                    </tr>`;
            }
            htmlCapa += `
                <tr class="total-row" style="background:#d4edda;">
                    <td colspan="2"><strong>TOTAL FATURAMENTO</strong></td>
                    <td class="text-right">
                        <strong>R$ ${formatarMoeda(totalFixo)}</strong>
                        <div style="font-size:10px; color:#888; font-weight:400;">+ valores pendentes</div>
                    </td>
                </tr>`;

            const htmlCapaBloco = `
                <div class="section" style="margin-bottom:32px;">
                    <div class="section-title">Resumo Executivo da Fatura</div>
                    <div class="no-print" style="display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap;">
                        <div style="flex:1; min-width:180px; background:#f0f9f4; border-radius:12px; padding:16px 20px; border-left:4px solid #3fb271;">
                            <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Fixo Mensal</div>
                            <div style="font-size:22px; font-weight:700; color:#103a48; margin-top:4px;">R$ ${formatarMoeda(818496.00 + 8000.00)}</div>
                        </div>
                        <div style="flex:1; min-width:180px; background:#fff8e1; border-radius:12px; padding:16px 20px; border-left:4px solid #f0a500;">
                            <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Serviços Extraordinários</div>
                            <div style="font-size:22px; font-weight:700; color:#103a48; margin-top:4px;">R$ ${formatarMoeda(data.resumo.total_faturamento)}</div>
                        </div>
                        <div style="flex:1; min-width:180px; background:#fef0f0; border-radius:12px; padding:16px 20px; border-left:4px solid #e05555;">
                            <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Peças e Componentes</div>
                            <div style="font-size:16px; font-weight:600; color:#e05555; margin-top:4px; font-style:italic;">⏳ Pendente API</div>
                        </div>
                        <div style="flex:1; min-width:180px; background:#eef4ff; border-radius:12px; padding:16px 20px; border-left:4px solid #4a90d9;">
                            <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Total de OS no período</div>
                            <div style="font-size:22px; font-weight:700; color:#103a48; margin-top:4px;">${data.resumo.total_os}</div>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Item</th><th>Descrição</th><th class="text-right">Valor (R$)</th></tr></thead>
                            <tbody>${htmlCapa}</tbody>
                        </table>
                    </div>
                    <div style="margin-top:12px; font-size:11px; color:#888; text-align:right;">
                        Período: ${data.periodo.inicio.split('-').reverse().join('/')} a ${data.periodo.fim.split('-').reverse().join('/')}
                        &nbsp;|&nbsp; Gerado em: ${data.data_geracao}
                        &nbsp;|&nbsp; Contrato: ${data.contrato}
                    </div>
                </div>`;

            // ── DETALHAMENTO OS ──
            const modelos = data.modelos;
            const periodo = data.periodo;
            let linhas = '';

            linhas += `
                <tr style="background:#f0f9f4;">
                    <td colspan="8" style="padding:8px 12px; font-size:12px; color:#555;">
                        <strong>Contrato: 001/2025 - Consórcio do Sistema Metropolitano – BRT</strong>
                        &nbsp;|&nbsp; Período: ${periodo.inicio.split('-').reverse().join('/')} a ${periodo.fim.split('-').reverse().join('/')}
                    </td>
                </tr>`;

            const porPrefixo = {};
            for (const [modelo, prefixos] of Object.entries(modelos)) {
                for (const [prefixo, ordens] of Object.entries(prefixos)) {
                    porPrefixo[prefixo] = { modelo, ordens };
                }
            }

            for (const [prefixo, dados] of Object.entries(porPrefixo)) {
                const { modelo, ordens } = dados;
                const v = ordens[0];

                linhas += `
                    <tr style="background:#f8fffe;">
                        <td colspan="8" style="padding:8px 12px; font-size:11px; color:#333; border-top:1px solid #ddd;">
                            <strong>Prefixo: ${prefixo}</strong> &nbsp;&nbsp;
                            Placa: ${v.placa} &nbsp;&nbsp;
                            Modelo: ${modelo} &nbsp;&nbsp;
                            Hodômetro: ${v.km_atual ?? '-'}
                        </td>
                    </tr>`;

                let totalPrefixo = 0;
                for (const os of ordens) {
                    totalPrefixo += os.valor_total || 0;

                    const danoBadge = os.is_dano_severo
                        ? '<span style="background:#fde8e8; color:#c0392b; font-size:10px; padding:2px 6px; border-radius:50px; font-weight:600;">⚠ Sim</span>'
                        : '<span style="background:#e8f5ee; color:#27ae60; font-size:10px; padding:2px 6px; border-radius:50px;">Não</span>';

                    let insumoHtml = '-';
                    if (os.insumos && os.insumos.length > 0) {
                        insumoHtml = os.insumos.map(i =>
                            `${i.descricao} (Qtd: ${i.quantidade}) — R$ ${formatarMoeda(i.valor_total)}`
                        ).join('<br>');
                    }

                    linhas += `
                        <tr>
                            <td>${os.data_abertura}</td>
                            <td>${os.data_fechamento}</td>
                            <td>${os.tarefas}</td>
                            <td>${os.descricao}</td>
                            <td>${os.numero_os}</td>
                            <td style="text-align:center">${danoBadge}</td>
                            <td style="font-size:11px">${insumoHtml}</td>
                            <td class="text-right">R$ ${formatarMoeda(os.valor_total)}</td>
                        </tr>`;
                }

                linhas += `
                    <tr class="total-row">
                        <td colspan="7"><strong>Total Prefixo ${prefixo}</strong></td>
                        <td class="text-right"><strong>R$ ${formatarMoeda(totalPrefixo)}</strong></td>
                    </tr>`;
            }

            // ── CUSTOS OPERACIONAIS ──
            let htmlCustos = '';
            const custos = data.custos_operacionais;

            for (const cat of custos.categorias) {
                htmlCustos += `
                    <tr style="background:#f0f9f4;">
                        <td colspan="4" style="padding:8px 12px; font-weight:700; font-size:12px; color:#103a48;">${cat.titulo}</td>
                    </tr>`;

                for (const item of cat.itens) {
                    htmlCustos += `
                        <tr>
                            <td>${item['Subitem'] || item['subitem']}</td>
                            <td>${item['Descrição']}</td>
                            <td style="text-align:center">${(item['% estimado'] * 100).toFixed(0)}%</td>
                            <td class="text-right">R$ ${formatarMoeda(item['Valor (R$)'])}</td>
                        </tr>`;
                }

                htmlCustos += `
                    <tr class="total-row">
                        <td colspan="3"><strong>Subtotal ${cat.titulo}</strong></td>
                        <td class="text-right"><strong>R$ ${formatarMoeda(cat.subtotal)}</strong></td>
                    </tr>`;
            }

            htmlCustos += `
                <tr class="total-row" style="background:#d4edda;">
                    <td colspan="2"><strong>TOTAL CUSTOS OPERACIONAIS</strong></td>
                    <td style="text-align:center"><strong>91%</strong></td>
                    <td class="text-right"><strong>R$ ${formatarMoeda(custos.total_geral)}</strong></td>
                </tr>
                <tr style="background:#fff8e1;">
                    <td colspan="4" style="font-size:11px; color:#555; padding:8px 12px;">
                        <strong>Diferença (9%):</strong> margem operacional, riscos, impostos indiretos e contingências.
                    </td>
                </tr>`;

            // ── MONTA TUDO ──
            area.innerHTML = htmlCapaBloco + `
                <div class="section">
                    <div class="section-title">Detalhamento das Ordens de Serviço</div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Início</th><th>Final</th><th>Tipo</th><th>Descrição</th>
                                    <th>Nº OS</th><th style="text-align:center">Dano Severo</th>
                                    <th>Insumos</th><th class="text-right">Valor (R$)</th>
                                </tr>
                            </thead>
                            <tbody>${linhas}</tbody>
                            <tfoot>
                                <tr class="total-row">
                                    <td colspan="7" style="text-align:right; font-weight:600;">TOTAL GERAL</td>
                                    <td class="valor">R$ ${formatarMoeda(data.resumo.total_faturamento)}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

                <div class="section" style="margin-top:32px;">
                    <div class="section-title">Quadro de Composição Operacional</div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Subitem</th><th>Descrição</th>
                                    <th style="text-align:center">% Estimado</th>
                                    <th class="text-right">Valor (R$)</th>
                                </tr>
                            </thead>
                            <tbody>${htmlCustos}</tbody>
                        </table>
                    </div>
                </div>`;
        })
        .catch(err => {
            console.error('Erro:', err);
            area.innerHTML = '<div class="empty-message">Erro ao carregar os dados.</div>';
        });
}

document.addEventListener('DOMContentLoaded', carregarRelatorio);
</script>
{% endblock %}
