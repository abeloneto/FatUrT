{% extends "base.html" %}

{% block title %}MAAS Peças{% endblock %}

{% block conteudo %}
<div class="control-bar">
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <div class="select-wrapper">
            <label><i class="fas fa-calendar-alt"></i> Mês:</label>
            <select id="select-mes" onchange="carregarRelatorio()">
                <option value="1"  {% if mes_atual == 1  %}selected{% endif %}>Janeiro</option>
                <option value="2"  {% if mes_atual == 2  %}selected{% endif %}>Fevereiro</option>
                <option value="3"  {% if mes_atual == 3  %}selected{% endif %}>Março</option>
                <option value="4"  {% if mes_atual == 4  %}selected{% endif %}>Abril</option>
                <option value="5"  {% if mes_atual == 5  %}selected{% endif %}>Maio</option>
                <option value="6"  {% if mes_atual == 6  %}selected{% endif %}>Junho</option>
                <option value="7"  {% if mes_atual == 7  %}selected{% endif %}>Julho</option>
                <option value="8"  {% if mes_atual == 8  %}selected{% endif %}>Agosto</option>
                <option value="9"  {% if mes_atual == 9  %}selected{% endif %}>Setembro</option>
                <option value="10" {% if mes_atual == 10 %}selected{% endif %}>Outubro</option>
                <option value="11" {% if mes_atual == 11 %}selected{% endif %}>Novembro</option>
                <option value="12" {% if mes_atual == 12 %}selected{% endif %}>Dezembro</option>
            </select>
        </div>
        <div class="select-wrapper">
            <select id="select-ano" onchange="carregarRelatorio()">
                <option value="2026" {% if ano_atual == 2026 %}selected{% endif %}>2026</option>
            </select>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-primary" onclick="carregarRelatorio()">
            <i class="fas fa-sync"></i> Atualizar
        </button>
        <button class="btn-secondary" onclick="exportarCSV()">
    <i class="fas fa-file-csv"></i> Exportar CSV
</button>
<button class="btn-secondary" onclick="window.print()">
    <i class="fas fa-file-pdf"></i> Gerar PDF
</button>
    </div>
</div>

<div id="relatorio-area">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
</div>
{% endblock %}

{% block extra_style %}
<style>
/* ── CARDS DE RESUMO ── */
.resumo-cards {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}
.resumo-card {
    flex: 1;
    min-width: 160px;
    border-radius: 12px;
    padding: 16px 20px;
}
.resumo-card .card-label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
.resumo-card .card-value {
    font-size: 20px;
    font-weight: 700;
    color: #103a48;
    margin-top: 4px;
}

/* ── BLOCO DE MODELO (agrupador) ── */
.modelo-bloco {
    margin-bottom: 32px;
}
.modelo-titulo {
    font-size: 13px;
    font-weight: 700;
    color: #103a48;
    background: #e8f5ee;
    border-left: 4px solid #3fb271;
    padding: 8px 14px;
    margin-bottom: 0;
    border-radius: 8px 8px 0 0;
}

/* ── BLOCO DE PREFIXO ── */
.prefixo-header {
    background: #f4f8fc;
    border-top: 1px solid #d8e8f0;
    border-bottom: 1px solid #d8e8f0;
    padding: 7px 14px;
    font-size: 12px;
    color: #333;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
}
.prefixo-header span { display: inline-flex; align-items: center; gap: 5px; }
.prefixo-header strong { color: #103a48; }

/* ── LINHA DE OS ── */
.os-row { cursor: pointer; transition: background 0.15s; }
.os-row:hover { background: #f0faf5 !important; }
.os-row td { vertical-align: middle; }

.badge-tipo {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 50px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.badge-corretiva  { background: #fff0e0; color: #c06000; }
.badge-preventiva { background: #e0f0ff; color: #005db8; }
.badge-outros     { background: #f0f0f0; color: #555; }
.badge-dano       { background: #ffe0e0; color: #c00000; }

/* ── EXPANSÍVEL (insumos) ── */
.insumos-row { display: none; }
.insumos-row.aberto { display: table-row; }
.insumos-inner {
    padding: 10px 20px 10px 40px;
    background: #f9fffe;
    font-size: 11px;
    border-bottom: 1px solid #e0eeea;
}
.insumos-inner table {
    width: auto;
    min-width: 380px;
    font-size: 11px;
    border-collapse: collapse;
}
.insumos-inner th {
    background: #d4eedd;
    color: #103a48;
    font-size: 10px;
    padding: 5px 10px;
}
.insumos-inner td {
    padding: 4px 10px;
    border-bottom: 1px solid #e8f2ee;
    color: #333;
}

/* ── OCULTAR NA TELA ── */
.print-only { display: none; }

/* ── IMPRESSÃO ── */
@media print {
    /* reset de cores para p&b sóbrio */
    .modelo-titulo {
        background: none !important;
        border-left: 3px solid #000 !important;
        color: #000 !important;
        font-size: 11px !important;
        padding: 6px 10px !important;
        border-radius: 0 !important;
    }
    .prefixo-header {
        background: none !important;
        border-top: 1px solid #999 !important;
        border-bottom: 1px solid #999 !important;
        font-size: 10px !important;
        padding: 5px 10px !important;
        gap: 16px !important;
    }
    .badge-tipo {
        background: none !important;
        color: #000 !important;
        border: 1px solid #000 !important;
        padding: 1px 6px !important;
        font-size: 9px !important;
        border-radius: 3px !important;
    }
    .os-row:hover { background: none !important; }

    /* nunca mostra insumos expandidos na impressão — a tabela resumida já cobre */
    .insumos-row { display: none !important; }

    /* totais por modelo impressão */
    .total-modelo-row td {
        font-size: 10px !important;
        border-top: 1.5px solid #000 !important;
        padding: 5px 10px !important;
    }
    .total-contrato-row td {
        font-size: 11px !important;
        border-top: 2px solid #000 !important;
        padding: 6px 10px !important;
    }

    /* cabeçalho de impressão */
    .print-header {
        display: block !important;
        margin-bottom: 16px;
    }
    .print-header-title {
        font-size: 14px;
        font-weight: 700;
        text-align: right;
        color: #000;
    }
    .print-header-periodo {
        font-size: 11px;
        color: #000;
        border-bottom: 1.5px solid #000;
        padding-bottom: 6px;
        margin-bottom: 8px;
    }
    .print-contrato {
        font-size: 11px;
        font-weight: 700;
        color: #000;
        border-bottom: 1px solid #ccc;
        padding-bottom: 4px;
        margin-bottom: 8px;
    }

    /* Mostrar tabela de resumo apenas na impressão */
    .print-only {
        display: block !important;
        page-break-before: auto;
        margin-top: 24px;
    }
    .print-only .section-title {
        font-size: 12px;
        margin-bottom: 8px;
        font-weight: 700;
        color: #000;
    }
    .print-only table {
        border-collapse: collapse;
        font-size: 10px;
    }
    .print-only th {
        background: #f0f0f0 !important;
        border: 1px solid #000 !important;
        padding: 6px 10px !important;
        font-weight: 700;
    }
    .print-only td {
        border: 1px solid #000 !important;
        padding: 5px 10px !important;
    }
}

/* oculto na tela */
.print-header { display: none; }
</style>
{% endblock %}

{% block scripts %}
<script>
    function exportarCSV() {
        const mes = document.getElementById('select-mes').value;
        const ano = document.getElementById('select-ano').value;
        window.location.href = `/api/relatorio/csv?mes=${mes}&ano=${ano}`;
    }

    // Função auxiliar para calcular o último dia do mês
    function getUltimoDiaMes(ano, mes) {
        return new Date(ano, mes, 0).getDate();
    }

    // Função para obter as datas do período selecionado
    function getPeriodoDatas(ano, mes) {
        let diaInicio, diaFim;
        const ultimoDia = getUltimoDiaMes(ano, mes);
        return { diaInicio: 1, diaFim: ultimoDia };
    }

    function carregarRelatorio() {
        const mes = document.getElementById('select-mes').value;
        const ano = document.getElementById('select-ano').value;
        const area = document.getElementById('relatorio-area');

        const containerAntigo = document.getElementById('resultadoTabela');
        if (containerAntigo) containerAntigo.innerHTML = ''

    area.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>';

    fetch(`/api/extratos?mes=${mes}&ano=${ano}`)
        .then(r => r.json())
        .then(data => {
                console.log('Total ordens:', data.ordens.length);
                console.log('Modelos:', Object.keys(data.modelos));
                
                // Verifica se OS sem insumos estão em ordens mas não em modelos
                const semInsumos = data.ordens.filter(o => !o.insumos || o.insumos.length === 0);
                console.log('OS sem insumos:', semInsumos.length);
                console.log('Exemplo OS sem insumo:', semInsumos[0]);
            if (!data.success || !data.ordens || data.ordens.length === 0) {
                area.innerHTML = '<div class="empty-message">Nenhuma OS encontrada para o período.</div>';
                return;
            }

            // Calcular as datas corretas do período
            const { diaInicio, diaFim } = getPeriodoDatas(parseInt(ano), parseInt(mes));
            const mesStr = mes.toString().padStart(2, '0');
            const diaInicioStr = diaInicio.toString().padStart(2, '0');
            const diaFimStr = diaFim.toString().padStart(2, '0');
            
            const periodoInicio = `${diaInicioStr}/${mesStr}/${ano}`;
            const periodoFim = `${diaFimStr}/${mesStr}/${ano}`;

            // ── Monta cards de resumo ──────────────────────────────────
            const cardsHtml = `
            <div class="resumo-cards no-print">
                <div class="resumo-card" style="background:#f0f9f4; border-left:4px solid #3fb271;">
                    <div class="card-label">Período</div>
                    <div class="card-value" style="font-size:15px;">${periodoInicio} a ${periodoFim}</div>
                </div>
                <div class="resumo-card" style="background:#eef4ff; border-left:4px solid #4a90d9;">
                    <div class="card-label">Total de OS</div>
                    <div class="card-value">${data.resumo.total_os}</div>
                </div>
                <div class="resumo-card" style="background:#f5f0ff; border-left:4px solid #7b5ea7;">
                    <div class="card-label">Contrato</div>
                    <div class="card-value" style="font-size:15px;">${data.contrato}</div>
                </div>
            </div>`;

            // ── Cabeçalho de impressão ─────────────────────────────────
            const printHeader = `
            <div class="print-header">
                <div class="print-header-periodo">
                    <strong>Período de Busca: ${periodoInicio} a ${periodoFim}</strong>
                    <span style="float:right; font-weight:700;">Extrato de Manutenção</span>
                </div>
                <div class="print-contrato">Contrato: ${data.contrato} – Consórcio do Sistema Metropolitano – BRT</div>
            </div>`;

            // ── ETAPA 1: Reorganizar dados agrupando por número de OS ──
            const ordensPorNumero = {};

            for (const [modelo, prefixosObj] of Object.entries(data.modelos)) {
                for (const [prefixo, ordens] of Object.entries(prefixosObj)) {
                    for (const os of ordens) {
                        const numeroOS = os.numero_os;
                        
                        if (!ordensPorNumero[numeroOS]) {
                            ordensPorNumero[numeroOS] = {
                                numero_os: os.numero_os,
                                data_abertura: os.data_abertura,
                                data_fechamento: os.data_fechamento,
                                km_atual: os.km_atual,
                                placa: os.placa,
                                tarefas: os.tarefas,
                                defeito_relatado: os.defeito_relatado,
                                is_dano_severo: os.is_dano_severo,
                                prefixo: prefixo,
                                modelo: modelo,
                                insumos: []
                            };
                        }
                        
                        if (os.insumos && Array.isArray(os.insumos) && os.insumos.length > 0) {
                            ordensPorNumero[numeroOS].insumos.push(...os.insumos);
                        }
                    }
                }
            }
            // ── ETAPA 2: Agrupar OS por prefixo ──
            const osPorPrefixo = {};

            for (const [numeroOS, osData] of Object.entries(ordensPorNumero)) {
                const prefixo = osData.prefixo;
                
                if (!osPorPrefixo[prefixo]) {
                    osPorPrefixo[prefixo] = {
                        info: {
                            placa: osData.placa,
                            modelo: osData.modelo,
                            km_atual: osData.km_atual
                        },
                        ordens: []
                    };
                }
                
                osPorPrefixo[prefixo].ordens.push(osData);
            }

            // ── ETAPA 3: Gerar HTML agrupado por prefixo ──
            let tabelaCompletaFinal = '';

            for (const [prefixo, dadosPrefixo] of Object.entries(osPorPrefixo)) {
                let tabelaHTML = '';
                
                // Gera linhas para este prefixo
                for (const osData of dadosPrefixo.ordens) {
                    const insumosValidos = osData.insumos || [];
                    
                    // Badge do tipo de serviço
                    const tarefa = (osData.tarefas || '-').toLowerCase();
                    let badgeClass = 'badge-outros';
                    if (tarefa.includes('corretiva')) badgeClass = 'badge-corretiva';
                    else if (tarefa.includes('preventiva')) badgeClass = 'badge-preventiva';
                    if (osData.is_dano_severo) badgeClass = 'badge-dano';
                    
                    const badgeLabel = osData.is_dano_severo ? 'Dano Severo' : (osData.tarefas || '-');
                    
                    // Para cada insumo, cria uma linha
                    if (insumosValidos.length > 0) {
                        insumosValidos.forEach((ins) => {
                            tabelaHTML += `
                            <tr>
                                <td>${osData.data_abertura || '-'}</td>
                                <td>${osData.data_fechamento || '-'}</td>
                                <td style="text-align:center; font-weight:600;">${osData.numero_os || '-'}</td>
                                <td style="text-align:center;">${osData.km_atual || '-'}</td>
                                <td><span class="badge-tipo ${badgeClass}">${badgeLabel}</span></td>
                                <td style="text-align:center;">${osData.defeito_relatado || '-'}</td>
                                <td style="max-width:320px; font-size:11px;">Mão de obra + ${ins.descricao || '-'}</td>
                                <td style="text-align:center; font-weight:600;">${ins.quantidade || 0}</td>
                            </tr>`;
                        });
                    } else {
                        // Se NÃO tem insumos, cria uma linha única
                        tabelaHTML += `
                        <tr>
                            <td>${osData.data_abertura || '-'}</td>
                            <td>${osData.data_fechamento || '-'}</td>
                            <td style="text-align:center; font-weight:600;">${osData.numero_os || '-'}</td>
                            <td style="text-align:center;">${osData.km_atual || '-'}</td>
                            <td><span class="badge-tipo ${badgeClass}">${badgeLabel}</span></td>
                            <td style="text-align:center;">${osData.defeito_relatado || '-'}</td>
                            <td style="color:#000; font-style:italic;">Mão de obra</td>
                            <td style="text-align:center;">-</td>
                        </tr>`;
                    }
                }
                
                // Monta o bloco completo deste prefixo
                tabelaCompletaFinal += `
                <div class="prefixo-header" style="border-radius:8px 8px 0 0;>
                    <span><i class="fas fa-bus" style="color:#3fb271;"></i> <strong>Prefixo:</strong> ${prefixo}</span>
                    <span><strong>Placa:</strong> ${dadosPrefixo.info.placa || 'N/A'}</span>
                    <span><strong>Modelo:</strong> ${dadosPrefixo.info.modelo || 'N/A'}</span>
                </div>
                <div class="table-wrapper" style="border-radius:0 0 8px 8px; border-top:none; margin-bottom:20px;">
                    <table>
                        <thead>
                            <tr>
                                <th>Início</th>
                                <th>Final</th>
                                <th style="text-align:center">Nº OS</th>
                                <th style="text-align:center">Hodômetro</th>
                                <th>Tipo de Serviço</th>
                                <th>Defeito Relatado</th>
                                <th>Serviço / Peça</th>
                                <th style="text-align:center">Qtde</th>
                            </tr>
                        </thead>
                        <tbody>${tabelaHTML}</tbody>
                    </table>
                </div>`;
            }

            // ── ETAPA 4: Inserir no DOM ──
            // 1. Verifica se já existe o container da tabela
            let container = document.getElementById('resultadoTabela');

            // 2. Se não existe, cria FORA do relatorio-area
            if (!container) {
                container = document.createElement('div');
                container.id = 'resultadoTabela';
                
                // Encontra a div dos cartões
                const relatorioArea = document.getElementById('relatorio-area');
                
                if (relatorioArea && relatorioArea.parentNode) {
                    // INSERE DEPOIS da div dos cartões
                    relatorioArea.parentNode.insertBefore(container, relatorioArea.nextSibling);
                } else {
                    // Fallback: insere no body
                    document.body.appendChild(container);
                }
            }


            // 3. Insere a tabela HTML na div
            container.innerHTML = tabelaCompletaFinal;
            // ── Rodapé ────────────────────────────────────────────────
            const rodape = `
            <div style="margin-top:14px; font-size:11px; color:#888; text-align:right;">
                Gerado em: ${data.data_geracao} &nbsp;|&nbsp; Contrato: ${data.contrato}
            </div>`;

            // ── Renderiza tudo ──
            area.innerHTML = `
            <div class="section">
                <div class="section-title no-print">Extrato de Manutenção</div>
                ${printHeader}
                ${cardsHtml}
                ${rodape}
            </div>`;
        })
        .catch(err => {
            console.error('Erro:', err);
            area.innerHTML = '<div class="empty-message">Erro ao carregar os dados.</div>';
        });
}
carregarRelatorio(); 
</script>
{% endblock %}
