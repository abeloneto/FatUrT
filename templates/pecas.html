{% extends "base.html" %}

{% block title %}MAAS Peças{% endblock %}

{% block conteudo %}
<div class="control-bar">
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <div class="select-wrapper">
            <label><i class="fas fa-calendar-alt"></i> Mês:</label>
            <select id="select-mes" onchange="carregarPecas()">
                <option value="1" {% if mes_atual == 1 %}selected{% endif %}>Janeiro</option>
                <option value="2" {% if mes_atual == 2 %}selected{% endif %}>Fevereiro</option>
                <option value="3" {% if mes_atual == 3 %}selected{% endif %}>Março</option>
                <option value="4" {% if mes_atual == 4 %}selected{% endif %}>Abril</option>
                <option value="5" {% if mes_atual == 5 %}selected{% endif %}>Maio</option>
                <option value="6" {% if mes_atual == 6 %}selected{% endif %}>Junho</option>
                <option value="7" {% if mes_atual == 7 %}selected{% endif %}>Julho</option>
                <option value="8" {% if mes_atual == 8 %}selected{% endif %}>Agosto</option>
                <option value="9" {% if mes_atual == 9 %}selected{% endif %}>Setembro</option>
                <option value="10" {% if mes_atual == 10 %}selected{% endif %}>Outubro</option>
                <option value="11" {% if mes_atual == 11 %}selected{% endif %}>Novembro</option>
                <option value="12" {% if mes_atual == 12 %}selected{% endif %}>Dezembro</option>
            </select>
        </div>
        <div class="select-wrapper">
            <select id="select-ano" onchange="carregarPecas()">
                <option value="2026" {% if ano_atual == 2026 %}selected{% endif %}>2026</option>
            </select>
        </div>
        <div class="select-wrapper">
            <label><i class="fas fa-calendar-week"></i> Período:</label>
            <select id="select-periodo" onchange="carregarPecas()">
                <option value="1">01 a 10</option>
                <option value="2">11 a 20</option>
                <option value="3">21 ao último dia</option>
            </select>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-primary" onclick="carregarPecas()">
            <i class="fas fa-sync"></i> Atualizar
        </button>
        <button class="btn-secondary" onclick="window.print()">
            <i class="fas fa-file-pdf"></i> Gerar PDF
        </button>
    </div>
</div>

<div id="relatorio-area">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
</div>
{% endblock %}

{% block scripts %}
<script>

function carregarPecas() {
    const mes = document.getElementById('select-mes').value;
    const ano = document.getElementById('select-ano').value;
    const periodo = document.getElementById('select-periodo').value;
    const area = document.getElementById('relatorio-area');

    area.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>';

    fetch(`/api/pecas?mes=${mes}&ano=${ano}&periodo=${periodo}`)
        .then(r => r.json())
        .then(data => {
            if (!data.success || data.prefixos.length === 0) {
                area.innerHTML = '<div class="empty-message">Nenhuma peça encontrada para o período.</div>';
                return;
            }

            let linhas = '';
            let totalGeral = 0;

            for (const prefixo of data.prefixos) {
                linhas += `
                    <tr style="background:#f8fffe;">
                        <td colspan="5" style="padding:8px 12px; font-size:11px; color:#333; border-top:1px solid #ddd;">
                            <strong>Prefixo: ${prefixo.prefixo}</strong> &nbsp;&nbsp;
                            Placa: ${prefixo.placa} &nbsp;&nbsp;
                            Modelo: ${prefixo.modelo}
                        </td>
                    </tr>`;

                for (const item of prefixo.itens) {
                    linhas += `
                        <tr>
                            <td>${item.data_fim}</td>
                            <td>${item.numero_os}</td>
                            <td>${item.descricao}</td>
                            <td style="text-align:center">${item.quantidade}</td>
                        </tr>`;
                }

            }

            area.innerHTML = `
                <div class="section">
                    <div class="section-title">Faturamento de Peças</div>

                    <div class="no-print" style="display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap;">
                        <div style="flex:1; min-width:180px; background:#f0f9f4; border-radius:12px; padding:16px 20px; border-left:4px solid #3fb271;">
                            <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Período</div>
                            <div style="font-size:16px; font-weight:700; color:#103a48; margin-top:4px;">
                                ${data.periodo.inicio.split('-').reverse().join('/')} a ${data.periodo.fim.split('-').reverse().join('/')}
                            </div>
                        </div>
                        <div style="flex:1; min-width:180px; background:#fff8e1; border-radius:12px; padding:16px 20px; border-left:4px solid #f0a500;">
                            <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Data de Faturamento</div>
                            <div style="font-size:18px; font-weight:700; color:#103a48; margin-top:4px;">
                                ${data.periodo.faturamento.split('-').reverse().join('/')}
                            </div>
                        </div>
                        <div style="flex:1; min-width:180px; background:#eef4ff; border-radius:12px; padding:16px 20px; border-left:4px solid #4a90d9;">
                            <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Total Geral</div>
                            <div style="font-size:22px; font-weight:700; color:#103a48; margin-top:4px;">
                                R$ ${formatarMoeda(1248.00)}
                            </div>
                        </div>
                        <div style="flex:1; min-width:180px; background:#f5f0ff; border-radius:12px; padding:16px 20px; border-left:4px solid #7b5ea7;">
                            <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Total de Itens</div>
                            <div style="font-size:22px; font-weight:700; color:#103a48; margin-top:4px;">
                                ${data.resumo.total_itens}
                            </div>
                        </div>
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Nº OS</th>
                                    <th>Peça</th>
                                    <th style="text-align:center">Qtd</th>
                                </tr>
                            </thead>
                            <tbody>${linhas}</tbody>
                        </table>
                    </div>

                    <div style="margin-top:12px; font-size:11px; color:#888; text-align:right;">
                        Gerado em: ${data.data_geracao} &nbsp;|&nbsp; Contrato: 001/2025
                    </div>
                </div>`;
        })
        .catch(err => {
            console.error('Erro:', err);
            area.innerHTML = '<div class="empty-message">Erro ao carregar os dados.</div>';
        });
}

document.addEventListener('DOMContentLoaded', carregarPecas);
</script>
{% endblock %}
