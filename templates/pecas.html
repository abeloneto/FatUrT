{% extends "base.html" %}

{% block title %}MAAS Faturamento Mensal{% endblock %}

{% block conteudo %}
<style>
    .show-on-print-only {
    display: none !important;
}
@media print {
        .no-print {
        display: none !important;
    }
    .print-only {
        display: block !important;
    }
    /* reset de cores para p&b sóbrio */
    tfoot {
            display: table-row-group !important;
        }
        
        /* Força o rodapé SEMPRE no final da tabela */
    table {
            page-break-inside: auto;
        }
    .modelo-titulo {
        background: none !important;
        border-left: 3px solid #000 !important;
        color: #000 !important;
        font-size: 11px !important;
        padding: 6px 10px !important;
        border-radius: 0 !important;
    }
    .prefixo-header {
        background: none !important;
        border-top: 1px solid #999 !important;
        border-bottom: 1px solid #999 !important;
        font-size: 10px !important;
        padding: 5px 10px !important;
        gap: 16px !important;
    }
    .badge-tipo {
        background: none !important;
        color: #000 !important;
        border: 1px solid #000 !important;
        padding: 1px 6px !important;
        font-size: 9px !important;
        border-radius: 3px !important;
    }
    .os-row:hover { background: none !important; }

    /* nunca mostra insumos expandidos na impressão — a tabela resumida já cobre */
    .insumos-row { display: none !important; }

    /* totais por modelo impressão */
    .total-modelo-row td {
        font-size: 10px !important;
        border-top: 1.5px solid #000 !important;
        padding: 5px 10px !important;
    }
    .total-contrato-row td {
        font-size: 11px !important;
        border-top: 2px solid #000 !important;
        padding: 6px 10px !important;
    }

    /* cabeçalho de impressão */
    .print-header {
        display: block !important;
        margin-bottom: 16px;
    }
    .print-header-title {
        font-size: 14px;
        font-weight: 700;
        text-align: right;
        color: #000;
    }
    .print-header-periodo {
        font-size: 11px;
        color: #000;
        border-bottom: 1.5px solid #000;
        padding-bottom: 6px;
        margin-bottom: 8px;
    }
    .print-contrato {
        font-size: 11px;
        font-weight: 700;
        color: #000;
        border-bottom: 1px solid #ccc;
        padding-bottom: 4px;
        margin-bottom: 8px;
    }
}
</style>

<div class="control-bar">
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <div class="select-wrapper">
            <label><i class="fas fa-calendar-alt"></i> Mês:</label>
            <select id="select-mes" onchange="carregarFaturamento()">
                <option value="1" {% if mes_atual == 1 %}selected{% endif %}>Janeiro</option>
                <option value="2" {% if mes_atual == 2 %}selected{% endif %}>Fevereiro</option>
                <option value="3" {% if mes_atual == 3 %}selected{% endif %}>Março</option>
                <option value="4" {% if mes_atual == 4 %}selected{% endif %}>Abril</option>
                <option value="5" {% if mes_atual == 5 %}selected{% endif %}>Maio</option>
                <option value="6" {% if mes_atual == 6 %}selected{% endif %}>Junho</option>
                <option value="7" {% if mes_atual == 7 %}selected{% endif %}>Julho</option>
                <option value="8" {% if mes_atual == 8 %}selected{% endif %}>Agosto</option>
                <option value="9" {% if mes_atual == 9 %}selected{% endif %}>Setembro</option>
                <option value="10" {% if mes_atual == 10 %}selected{% endif %}>Outubro</option>
                <option value="11" {% if mes_atual == 11 %}selected{% endif %}>Novembro</option>
                <option value="12" {% if mes_atual == 12 %}selected{% endif %}>Dezembro</option>
            </select>
        </div>
        <div class="select-wrapper">
            <select id="select-ano" onchange="carregarFaturamento()">
                <option value="2026" {% if ano_atual == 2026 %}selected{% endif %}>2026</option>
            </select>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-primary" onclick="carregarFaturamento()">
            <i class="fas fa-sync"></i> Atualizar
        </button>
        <button class="btn-secondary" onclick="window.print()">
            <i class="fas fa-file-pdf"></i> Gerar PDF
        </button>
    </div>
</div>

<div id="relatorio-area">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Função para formatar valores monetários
function formatarMoeda(valor) {
    return parseFloat(valor).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function carregarFaturamento() {
    const mes = document.getElementById('select-mes').value;
    const ano = document.getElementById('select-ano').value;
    const area = document.getElementById('relatorio-area');

    area.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>';

    // Carregar dados em paralelo
    Promise.all([
        fetch(`/api/faturamento-mensal?mes=${mes}&ano=${ano}`).then(r => r.json()),
        fetch(`/api/pecas?mes=${mes}&ano=${ano}&periodo=1`).then(r => r.json()),
        fetch(`/api/pecas?mes=${mes}&ano=${ano}&periodo=2`).then(r => r.json()),
        fetch(`/api/pecas?mes=${mes}&ano=${ano}&periodo=3`).then(r => r.json())
    ])
    .then(([faturamento, pecas1, pecas2, pecas3]) => {        
        if (!faturamento.success) {
            area.innerHTML = '<div class="empty-message">Erro ao carregar dados do faturamento.</div>';
            return;
        }

        renderizarFaturamento(faturamento, [pecas1, pecas2, pecas3]);
    })
    .catch(err => {
        console.error('Erro:', err);
        area.innerHTML = '<div class="empty-message">Erro ao carregar os dados.</div>';
    });
}

function gerarLinhasCustosOperacionais() {
    const categorias = [
        {
            item: 'Infraestrutura', pct: 14, cor: '#185FA5',
            rows: [
                { sub: 'Instalações físicas',    desc: 'Galpão, área técnica, utilidades'},
                { sub: 'Energia elétrica',        desc: 'Operação equipamentos e recarga'},
                { sub: 'Segurança e vigilância',  desc: 'Patrimonial e operacional'      },
                { sub: 'Manutenção predial',      desc: 'Conservação da estrutura'       },
            ]
        },
        {
            item: 'Pessoal técnico especializado', pct: 49, cor: '#0F6E56',
            rows: [
                { sub: 'Engenheiros e supervisores',      desc: 'Coordenação técnica'     },
                { sub: 'Técnicos manutenção elétrica',    desc: 'Alta tensão e baterias'  },
                { sub: 'Técnicos mecânicos',              desc: 'Sistemas mecânicos'      },
                { sub: 'Equipe borracharia',              desc: 'Pneus e rodagem'         },

                { sub: 'Equipamentos alta tensão',    desc: 'Ferramentas HV'},
                { sub: 'Equipamentos mecânicos',      desc: 'Elevadores, compressores'},

            rows: [

                { sub: 'Combustível/energia',  desc: 'Operação'           },
                { sub: 'Manutenção veículo',   desc: 'Preventiva/corretiva'  },
            ]
        },
        {
            item: 'Sistema de gestão de chamados', pct: 6, cor: '#3B6D11',
            rows: [
                { sub: 'Plataforma digital',  desc: 'Gestão de chamados' },
                { sub: 'Monitoramento e TI',  desc: 'Suporte técnico'         },
                { sub: 'Relatórios e BI',     desc: 'Indicadores e controle'  },
            ]
        },

        html += `

                    <span style="display:inline-block; width:9px; height:9px; border-radius:50%; background:${cat.cor}; margin-right:8px; vertical-align:middle;"></span>

                <td style="padding:9px 12px; text-align:center; font-weight:700; font-size:12px; color:${cat.cor}; border-bottom:1px solid #d8e8f0;">

        // Linhas dos subitens

}

function renderizarFaturamento(data, pecasPeriodos) {
    const area = document.getElementById('relatorio-area');
    
    // Calcular totais
    const totalVeiculos = data.veiculos.reduce((sum, v) => sum + v.valor_mensal, 0);
    const totalPecasPeriodo1 = pecasPeriodos[0].resumo?.total_geral || 0;
    const totalPecasPeriodo2 = pecasPeriodos[1].resumo?.total_geral || 0;
    const totalPecasPeriodo3 = pecasPeriodos[2].resumo?.total_geral || 0;
    const totalPecas = totalPecasPeriodo1 + totalPecasPeriodo2 + totalPecasPeriodo3;
    
    const totalGeral = totalVeiculos + data.estoque_pecas ;

    const cabecalhoTotal = `
        <div class="print-only" style="margin-bottom: 30px; padding: 25px; 
                    border-radius: 12px; color: white;">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="flex: 1;">
                    <div style="font-size: 14px; opacity: 0.9; margin-bottom: 8px; 
                                text-transform: uppercase; letter-spacing: 1px;">
                        📊 Faturamento Total - ${data.nome_mes}/${data.ano}
                    </div>
                    <div style="font-size: 32px; font-weight: 800; line-height: 1;">
                        R$ ${formatarMoeda(totalGeral)}
                    </div>
                    <div style="font-size: 13px; opacity: 0.85; margin-top: 10px;">
                        <i class="fas fa-info-circle"></i> 
                        Valor total do faturamento mensal (custos fixos + estoque)
                    </div>
                </div>
                <div style="text-align: right; font-size: 14px; opacity: 0.9;">
                    <div style="margin-bottom: 5px;">📅 ${data.contrato}</div>
                    <div>🕐 ${data.data_geracao}</div>
                </div>
            </div>
        </div>
    `;

    // Cards de resumo
    const cardsResumo = `
        <div class="no-print" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px;">
            <div style="background:#f0f9f4; border-radius:12px; padding:16px 20px; border-left:4px solid #3fb271;">
                <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Período</div>
                <div style="font-size:16px; font-weight:700; color:#103a48; margin-top:4px;">
                    ${data.nome_mes}/${data.ano}
                </div>
            </div>
            <div style="background:#eef4ff; border-radius:12px; padding:16px 20px; border-left:4px solid #4a90d9;">
                <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Veículos Cadastrados</div>
                <div style="font-size:22px; font-weight:700; color:#103a48; margin-top:4px;">
                    ${data.veiculos.length}
                </div>
            </div>
            <div style="background:#fff8e1; border-radius:12px; padding:16px 20px; border-left:4px solid #f0a500;">
                <div style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.06em;">Total Faturamento</div>
                <div style="font-size:22px; font-weight:700; color:#103a48; margin-top:4px;">
                    R$ ${formatarMoeda(totalGeral)}
                </div>
            </div>
        </div>
    `;

    // Seção 1: Custos Fixos por Veículo
    let linhasVeiculos = '';
    data.veiculos.forEach(v => {
        linhasVeiculos += `
            <tr>
                <td style="text-align:center;">${v.prefixo}</td>
                <td style="text-align:center;">${v.placa}</td>
                <td style="text-align:center;">${v.modelo}</td>
                <td style="text-align:right; font-weight:600;">R$ ${formatarMoeda(v.valor_mensal)}</td>
            </tr>`;
    });

    const secaoVeiculos = `
        <div class="section">
            <div class="section-title">
                <i class="fas fa-bus" style="margin-right:8px;"></i>
                1. Custos Fixos por Veículo
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Prefixo</th>
                            <th>Placa</th>
                            <th>Modelo</th>
                            <th style="text-align:right;">Valor Mensal</th>
                        </tr>
                    </thead>
                    <tbody>${linhasVeiculos}</tbody>
                    <tfoot>
                        <tr style="background:#4fb16e; color:#fff; font-weight:700;">
                            <td colspan="3" style="padding:10px 12px;">SUBTOTAL VEÍCULOS</td>
                            <td style="text-align:right; padding:10px 12px;">R$ ${formatarMoeda(totalVeiculos)}</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    `;

    // Seção 2: Estoque de Peças
    const secaoEstoque = `
        <div class="section">
            <div class="section-title">
                <i class="fas fa-boxes" style="margin-right:8px;"></i>
                2. Estoque de Peças (Valor Fixo)
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th style="text-align:right;">Valor Mensal</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Gestão de Estoque de Peças</td>
                            <td style="text-align:right; font-weight:600;">R$ ${formatarMoeda(data.estoque_pecas)}</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr style="background:#4fb16e; color:#fff; font-weight:700;">
                            <td style="padding:10px 12px;">SUBTOTAL ESTOQUE</td>
                            <td style="text-align:right; padding:10px 12px;">R$ ${formatarMoeda(data.estoque_pecas)}</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    `;

    // Seção 3: Danos Severos
    const secaoDanosSeveros = gerarSecaoDanosSeveros(data);

    // Seção 4: Custos Operacionais
    const secaoCustosOperacionais = `
        <div class="section">
            <div class="section-title">
                <i class="fas fa-cogs" style="margin-right:8px;"></i>
                4. Custos Operacionais
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width:38%;">Categoria / Subitem</th>
                            <th style="width:30%;">Descrição</th>
                            <th style="width:10%;">%</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${gerarLinhasCustosOperacionais()}
                    </tbody>
                    <tfoot>
                        <tr style="background:#4fb16e; color:#fff; font-weight:700;">
                            <td colspan="2" style="padding:10px 12px;">PERCENTUAL TOTAL</td>
                            <td style="text-align:right; padding:10px 12px;">100%</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    `;

    function gerarSecaoDanosSeveros(data) {
    const danos = data.danos_severos || [];
    const total = data.total_danos_severos || 0;
    
    let linhasDanos = '';
    
    if (danos.length === 0) {
        linhasDanos = `
            <tr>
                <td colspan="5" style="text-align:center; color:#999; padding:20px;">
                    <i class="fas fa-check-circle" style="font-size:32px; margin-bottom:8px; display:block; color:#28a745;"></i>
                    Nenhum dano severo registrado neste período
                </td>
            </tr>
        `;
    } else {
        danos.forEach(dano => {
            linhasDanos += `
                <tr>
                    <td>${dano.prefixo}</td>
                    <td style="text-align:center;">${dano.numero_os}</td>
                    <td>${dano.modelo}</td>
                    <td style="font-size:11px;">${dano.defeito_relatado}</td>
                    <td style="text-align:right; font-weight:600;">R$ ${formatarMoeda(dano.valor)}</td>
                </tr>
            `;
        });
    }
    
    return `
        <div class="section">
            <div class="section-title">
                <i class="fas fa-tools" style="margin-right:8px;"></i>
                3. Serviços Extraordinários (Danos Severos)
            </div>
            ${danos.length === 0 ? `
                <div style="background:#d4edda; border-left:4px solid #28a745; padding:16px 20px; border-radius:8px; margin-bottom:16px;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <i class="fas fa-check-circle" style="font-size:24px; color:#155724;"></i>
                        <div>
                            <div style="font-weight:600; color:#155724; margin-bottom:4px;">Tudo OK!</div>
                            <div style="font-size:13px; color:#155724;">
                                Nenhum dano severo foi registrado neste período.
                            </div>
                        </div>
                    </div>
                </div>
            ` : ''}
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Prefixo</th>
                            <th style="text-align:center;">Nº OS</th>
                            <th>Modelo</th>
                            <th>Defeito Relatado</th>
                            <th style="text-align:right;">Valor</th>
                        </tr>
                    </thead>
                    <tbody>${linhasDanos}</tbody>
                    <tfoot>
                        <tr style="background:#${danos.length > 0 ? 'dc3545' : '6c757d'}; color:#fff; font-weight:700;">
                            <td colspan="4" style="padding:10px 12px;">SUBTOTAL DANOS SEVEROS</td>
                            <td style="text-align:right; padding:10px 12px;">R$ ${formatarMoeda(total)}</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    `;
}

    // Seção 5: Peças (3 períodos)
    const secaoPecas = gerarSecaoPecas(pecasPeriodos, totalPecasPeriodo1, totalPecasPeriodo2, totalPecasPeriodo3, totalPecas);

    // Total Geral
    const secaoTotal = `
        <div class="section no-print" style="background:linear-gradient(135deg, #2a6f2f 0%, #3fa746 100%); border-radius:12px; padding:24px; margin-top:32px;">
            <div style="display:flex; justify-content:space-between; align-items:center; color:#fff;">
                <div>
                    <div style="font-size:14px; opacity:0.9; margin-bottom:4px;">TOTAL GERAL DO FATURAMENTO</div>
                    <div style="font-size:32px; font-weight:700;">${data.nome_mes}/${data.ano}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:42px; font-weight:700;">R$ ${formatarMoeda(totalGeral)}</div>
                    <div style="font-size:13px; opacity:0.9; margin-top:4px;">
                        <i class="fa-solid fa-circle-exclamation"></i> Total desconsiderando valores já faturados (peças e danos severos)
                    </div>
                </div>
            </div>
        </div>
    `;

    // Rodapé
    const rodape = `
        <div style="margin-top:24px; padding-top:16px; border-top:2px solid #e0e0e0; font-size:11px; color:#888; text-align:right;">
            <div><strong>Contrato:</strong> ${data.contrato}</div>
            <div style="margin-top:4px;"><strong>Gerado em:</strong> ${data.data_geracao}</div>
        </div>
    `;

    area.innerHTML = cabecalhoTotal + cardsResumo + secaoVeiculos + secaoEstoque + secaoDanosSeveros + 
                     secaoCustosOperacionais + secaoPecas + secaoTotal + rodape;
}

function gerarSecaoPecas(periodos, total1, total2, total3, totalGeral) {
    const nomePeriodos = ['01 a 10', '11 a 20', '21 ao último dia'];
    let linhasPeriodos = '';

    periodos.forEach((periodo, idx) => {
        const totalPeriodo = [total1, total2, total3][idx];
        const statusPago = `
            <span style="display:inline-flex; align-items:center; gap:6px; background:#d4edda; color:#155724; 
                         padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600;">
                <i class="fas fa-check-circle"></i> FATURADO
                                <td style="text-align:right; padding:12px; font-weight:700; color:#28a745;">
                     R$ ${formatarMoeda(totalPeriodo)}
                </td>
            </span>
        `;
        
        linhasPeriodos += `
            <tr style="background:#f8f9fa;">
                <td colspan="3" style="padding:12px; font-weight:600; font-size:12px; color:#495057;">
                    <i class="fas fa-calendar-day"></i> Período ${idx + 1}: ${nomePeriodos[idx]}
                </td>
            </tr>
        `;

        // Adicionar detalhes das peças por prefixo
        if (periodo.success && periodo.prefixos && periodo.prefixos.length > 0) {
            periodo.prefixos.forEach(prefixo => {
                const osUnicas = [...new Set(prefixo.itens.map(i => i.numero_os))].join(', ');
                const totalInsumos = prefixo.itens.reduce((acc, item) => acc + (item.quantidade || 0), 0);

                linhasPeriodos += `
                    <tr style="background:#ffffff;">
                        <td style="padding-left:32px; font-size:11px; color:#6c757d;">
                            Prefixo ${prefixo.prefixo}
                        </td>
                        <td style="font-size:11px; color:#6c757d;">
                            ${prefixo.modelo}
                        </td>
                        <td style="font-size:11px; color:#6c757d;">
                            OS: ${[...new Set(prefixo.itens.map(i => i.numero_os))].join(', ')}
                        </td>
                        <td style="text-align:center; font-size:11px; color:#6c757d;">
                            ${totalInsumos} 
                        </td>   
                        <td style="text-align:right; font-size:11px; color:#6c757d;">
                            R$ ${formatarMoeda(prefixo.subtotal || 0)}
                        </td>
                    </tr>
                `;
            });
                linhasPeriodos += `
                    <tr style="background:#e9f7ef; border-bottom:3px solid #dceeff;">
                        <td colspan="4" style="padding:10px 12px; font-weight:700; font-size:12px; color:#155724;">
                            Subtotal Período
                        </td>
                        <td style="text-align:right; padding:10px 12px; font-weight:700; color:#28a745;">
                            R$ ${formatarMoeda(totalPeriodo)}
                        </td>
                    </tr>
                `;
        } else {
            linhasPeriodos += `
                <tr>
                    <td colspan="5" style="text-align:center; padding:12px; font-size:11px; color:#999; font-style:italic;">
                        Nenhuma peça faturada neste período
                    </td>
                </tr>
            `;
        }
    });

    return `
        <div class="section">
            <div class="section-title">
                <i class="fas fa-cog" style="margin-right:8px;"></i>
                5. Faturamento de Peças (Valores já Faturados)
            </div>
            <div class="section no-print"; style="background:#e7f3ff; border-left:4px solid #2196F3; padding:16px 20px; border-radius:8px; margin-bottom:16px;">
                <div class="section no-print"; style="display:flex; align-items:center; gap:12px;">
                    <i class="fas fa-info-circle" style="font-size:24px; color:#0d47a1;"></i>
                    <div>
                        <div class="section no-print"; style="font-weight:600; color:#0d47a1; margin-bottom:4px;">Informação Importante</div>
                        <div class="section no-print"; style="font-size:13px; color:#1565c0;">
                            Os valores de peças são faturados e pagos a cada 10 dias (3 vezes por mês).
                            Os valores abaixo são apresentados apenas para fins contábeis e de auditoria,
                            <strong>pois já foram devidamente faturados</strong>.
                        </div>
                    </div>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Período / Veículo</th>
                            <th>Modelo</th>
                            <th>Nº OS</th>
                            <th style="text-align:center;">Insumos Utilizados</th>
                            <th style="text-align:right;">Valor</th>
                        </tr>
                    </thead>
                    <tbody>${linhasPeriodos}</tbody>
                    <tfoot>
                        <tr style="background:#28a745; color:#fff; font-weight:700;">
                            <td colspan="4" style="padding:10px 12px;">
                                SUBTOTAL PEÇAS (Já Faturado - Fins Contábeis)
                            </td>
                            <td style="text-align:right; padding:10px 12px;">R$ ${formatarMoeda(totalGeral)}</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', carregarFaturamento);
</script>
{% endblock %}
